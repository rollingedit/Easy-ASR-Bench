name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.7"
        required: true
        type: string
      allow_replace_public:
        description: "Allow replacing assets on an already-public release"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Publish as a public prerelease/audit build instead of a stable latest release"
        required: false
        default: false
        type: boolean
      allow_incomplete_smoke:
        description: "Allow public prerelease publication when required manual smoke rows are present but not all pass"
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install pyyaml

      - name: Validate release files
        run: python scripts/validate_release_files.py

      - name: Validate physical source files
        run: python scripts/validate_physical_files.py --repo .

      - name: Validate public tree and history hygiene
        run: |
          python scripts/validate_public_hygiene.py --tracked
          python scripts/validate_public_hygiene.py --history-ref HEAD

      - name: Build release ZIP
        run: python scripts/build_release_zip.py --version ${{ inputs.tag }} --update-metadata

      - name: Ensure release metadata was committed
        run: git diff --exit-code -- setup.bat installer/manifest.json installer/checksums.json

      - name: Stage release bootstrap assets
        shell: pwsh
        run: |
          Copy-Item installer/install.ps1 install.ps1
          New-Item -ItemType Directory -Force -Path dist/release-assets | Out-Null
          Copy-Item dist/Easy-ASR-Bench-${{ inputs.tag }}-win.zip dist/release-assets/
          Copy-Item setup.bat dist/release-assets/
          Copy-Item installer/install.ps1 dist/release-assets/install.ps1
          Copy-Item installer/manifest.json dist/release-assets/
          Copy-Item installer/checksums.json dist/release-assets/

      - name: Prepare release smoke artifact
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          $collected = "qa/release-smoke-$tag.json"
          $output = "release-smoke-$tag.json"
          if (Test-Path $collected) {
            Copy-Item $collected $output
          } else {
            python scripts/write_release_smoke.py --tag $tag --commit ${{ github.sha }} --output $output
          }

      - name: Validate release smoke artifact
        shell: pwsh
        run: |
          $args = @(
            "scripts/validate_release_smoke.py",
            "--smoke", "release-smoke-${{ inputs.tag }}.json",
            "--required", "tests/fixtures/release_required_rows_v2.json"
          )
          if ("${{ inputs.prerelease }}" -ne "true" -or "${{ inputs.allow_incomplete_smoke }}" -ne "true") {
            $args += @("--require-all-pass", "--require-log-hashes", "--require-environment-summary")
          }
          python @args
          python scripts/validate_public_hygiene.py --path release-smoke-${{ inputs.tag }}.json

      - name: Write release notes
        run: python scripts/write_release_notes.py ${{ inputs.tag }} --output release_notes/${{ inputs.tag }}.md --smoke release-smoke-${{ inputs.tag }}.json

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ inputs.tag }}"
          $zip = "dist/Easy-ASR-Bench-$tag-win.zip"
          $notes = "release_notes/$tag.md"
          $existingJson = gh release view $tag --json isDraft 2>$null
          if ($LASTEXITCODE -eq 0) {
            $existing = $existingJson | ConvertFrom-Json
            if ($existing.isDraft -ne $true -and "${{ inputs.allow_replace_public }}" -ne "true") {
              throw "Refusing to replace assets on an already-public release. Use a new tag, or rerun with allow_replace_public=true."
            }
            gh release edit $tag --title "Easy ASR Bench $tag" --notes-file $notes
          } else {
            gh release create $tag --title "Easy ASR Bench $tag" --notes-file $notes --draft
          }
          gh release upload $tag $zip setup.bat install.ps1 installer/manifest.json installer/checksums.json release-smoke-$tag.json --clobber

      - name: Verify uploaded draft release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/verify_github_release.py `
            --repo rollingedit/Easy-ASR-Bench `
            --tag ${{ inputs.tag }} `
            --expected-commit ${{ github.sha }} `
            --write-transcript release-verification-${{ inputs.tag }}.txt

      - name: Verify standalone setup against staged release assets before publish
        shell: cmd
        run: setup.bat --dry-run --verify-release --asset-dir dist\release-assets

      - name: Upload release verification transcript
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ inputs.tag }} release-verification-${{ inputs.tag }}.txt --clobber
          Remove-Item -LiteralPath release-verification-${{ inputs.tag }}.txt -Force
          gh release download ${{ inputs.tag }} --pattern release-verification-${{ inputs.tag }}.txt --dir uploaded-transcript
          $transcript = Get-Content -Raw (Join-Path uploaded-transcript release-verification-${{ inputs.tag }}.txt)
          if (-not $transcript.Contains("Easy ASR Bench release verification transcript") -or -not $transcript.Contains("downloaded_assets:")) {
            throw "Uploaded release verification transcript is missing required proof fields."
          }
          python scripts/write_release_verification_manifest.py `
            --tag ${{ inputs.tag }} `
            --transcript (Join-Path uploaded-transcript release-verification-${{ inputs.tag }}.txt) `
            --assets-dir dist/release-assets `
            --asset release-smoke-${{ inputs.tag }}.json `
            --output release-verification-manifest-${{ inputs.tag }}.json
          gh release upload ${{ inputs.tag }} release-verification-manifest-${{ inputs.tag }}.json --clobber

      - name: Publish verified release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ("${{ inputs.prerelease }}" -eq "true") {
            gh release edit ${{ inputs.tag }} --draft=false --prerelease
          } else {
            gh release edit ${{ inputs.tag }} --draft=false --latest
          }

      - name: Verify public setup path
        shell: pwsh
        run: |
          $lonely = Join-Path $env:RUNNER_TEMP "easy-asr-lonely-setup"
          Remove-Item -LiteralPath $lonely -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $lonely | Out-Null
          Copy-Item setup.bat (Join-Path $lonely "setup.bat") -Force
          cmd /d /c "`"$lonely\setup.bat`" --dry-run --verify-release"
