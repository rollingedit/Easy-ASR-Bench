name: Release Gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to verify uploaded assets, for example v0.2.7"
        required: false
        type: string
  release:
    types: [published]

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install pyyaml

      - name: Validate release files
        run: python scripts/validate_release_files.py

      - name: Build and validate release ZIP
        shell: pwsh
        run: |
          $version = python -c "import app; print('v' + app.__version__)"
          python scripts/build_release_zip.py --version $version

      - name: Upload built release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: easy-asr-bench-release-zip
          path: dist/Easy-ASR-Bench-*-win.zip

      - name: Verify published release asset
        if: github.event_name == 'release' || inputs.release_tag != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ("${{ inputs.release_tag }}" -ne "") {
            $tag = "${{ inputs.release_tag }}"
          }
          gh release download $tag --pattern manifest.json --pattern checksums.json --dir release-asset
          $manifest = Get-Content -Raw release-asset/manifest.json | ConvertFrom-Json
          $checksums = Get-Content -Raw release-asset/checksums.json | ConvertFrom-Json
          $zipName = $manifest.app_zip
          gh release download $tag --pattern $zipName --dir release-asset
          $actual = "sha256:" + (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path "release-asset" $zipName)).Hash.ToLowerInvariant()
          $expected = $checksums.files.$zipName
          if ($actual -ne $expected) {
            throw "Published release asset checksum mismatch for $zipName. Expected $expected, got $actual"
          }

      - name: Compile Python
        run: python -m compileall app tests

      - name: Install core and test dependencies
        run: |
          python -m pip install -r requirements/core.txt
          python -m pip install pytest

      - name: Run unit tests
        run: python -m pytest --basetemp .pytest_tmp -p no:cacheprovider

      - name: Setup dry run
        shell: cmd
        run: setup.bat --dry-run --local

      - name: Launcher doctor
        shell: cmd
        run: python -m app.doctor --config config.json --strict
